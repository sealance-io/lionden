# yaml-language-server: $schema=https://raw.githubusercontent.com/suzuki-shunsuke/pinact/refs/heads/main/json-schema/pinact.json
# pinact - https://github.com/suzuki-shunsuke/pinact
#
# All GitHub Actions are pinned to a full commit SHA with a `# vX.Y.Z` comment.
# `pinact run --verify` checks the comment matches the SHA; `pinact run --verify-min-age`
# enforces the cooldown below. Both run in .github/workflows/pinact-verify.yml.
version: 3

# Default cooldown: only adopt action releases at least 21 days old — matches the
# github-actions Dependabot cooldown in .github/dependabot.yml. Per-owner overrides below.
min_age:
  value: 21

# Owner-graded cooldown policy. Trust scales with the publisher:
#   - sealance-io  -> first-party, no cooldown.
#   - Provable/Aleo -> near-first-party, minimal cooldown (<=3 days).
#   - everyone else -> the 21-day default above.
# Later matching rules override earlier ones at the field level.
rules:
  - min_age: 0
    conditions:
      - expr: |
          ActionRepoOwner == "sealance-io"
  - min_age: 3
    conditions:
      - expr: |
          ActionRepoOwner in ["ProvableHQ", "AleoHQ", "AleoNet"]
