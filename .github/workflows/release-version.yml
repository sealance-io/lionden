name: Release - Version

on:
  push:
    branches:
      - main
  workflow_dispatch:

# No default permissions — every job requests only what it needs.
permissions: {}

# Never cancel an in-flight versioning run.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # Opens/updates the "Version Packages" PR from accumulated changesets. Uses a GitHub App
  # token so merging that PR can trigger release-publish.yml (the default GITHUB_TOKEN can't
  # trigger downstream workflows). No-op when there are no changesets.
  version:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release-automation
    permissions:
      contents: read # App token performs the writes
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.SEALANCE_PUBLIC_SIGNER_APP_ID }}
          private-key: ${{ secrets.SEALANCE_PUBLIC_SIGNER_APP_PRIVATE_KEY }}
          repositories: lionden
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false # never cache in privileged release builds
      - run: npm run lint:lockfile
      - run: npm ci --ignore-scripts --no-audit --no-fund --allow-git=none
      - name: Create or update the Version Packages PR
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: npm run version-packages
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
