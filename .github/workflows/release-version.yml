name: Release - Version

on:
  push:
    branches:
      - main
  workflow_dispatch:

# No default permissions — every job requests only what it needs.
permissions: {}

# Never cancel an in-flight versioning run.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # Opens/updates the "Version Packages" PR from accumulated changesets. Uses a GitHub App
  # token so merging that PR can trigger release-publish.yml (the default GITHUB_TOKEN can't
  # trigger downstream workflows). No-op when there are no changesets.
  version:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release-automation
    permissions:
      contents: read # App token performs the writes
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.SEALANCE_PUBLIC_SIGNER_APP_ID }}
          private-key: ${{ secrets.SEALANCE_PUBLIC_SIGNER_APP_PRIVATE_KEY }}
          repositories: lionden
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false # never cache in privileged release builds
      - run: npm run lint:lockfile
      - run: npm ci --ignore-scripts --no-audit --no-fund --allow-git=none
      - name: Create or update the Version Packages PR
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          version: npm run version-packages
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
