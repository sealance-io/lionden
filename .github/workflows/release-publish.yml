name: Release - Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

# No default permissions — every job requests only what it needs.
permissions: {}

# Never cancel an in-flight publish.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # Gate: only publish when this push is the merge of the changesets "Version Packages" PR
  # (branch changeset-release/main), or on a manual dispatch from main. `changeset publish`
  # is idempotent, so a spurious trigger is harmless.
  check-release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
    steps:
      - name: Determine whether to publish
        id: check
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              if (context.ref !== 'refs/heads/main') {
                core.warning(`Manual dispatch on ${context.ref} — refusing to publish from a non-main ref`);
                core.setOutput('should_publish', 'false');
                return;
              }
              core.info('Manual dispatch from main — publishing');
              core.setOutput('should_publish', 'true');
              return;
            }
            const { data: prs } =
              await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
              });
            const releasePr = prs.find(
              (pr) => pr.head.ref === 'changeset-release/main' && pr.merged_at,
            );
            core.info(
              releasePr
                ? `Release PR #${releasePr.number} merged — publishing`
                : 'Not a release-PR merge — skipping publish',
            );
            core.setOutput('should_publish', releasePr ? 'true' : 'false');

  publish-npm:
    needs: check-release
    # Defense-in-depth: never publish from anything but main, regardless of the gate.
    if: needs.check-release.outputs.should_publish == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm-publish # protected: required reviewers, main-only
    permissions:
      contents: write # push tags + create GitHub Releases
      id-token: write # npm OIDC trusted publishing
    defaults:
      run:
        shell: bash -eo pipefail {0}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.SEALANCE_PUBLIC_SIGNER_APP_ID }}
          private-key: ${{ secrets.SEALANCE_PUBLIC_SIGNER_APP_PRIVATE_KEY }}
          repositories: lionden
          permission-contents: write
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }} # creds retained → tag push works
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org" # OIDC; no NODE_AUTH_TOKEN
          package-manager-cache: false # never cache in privileged release builds
      - run: npm run lint:lockfile
      - run: npm ci --ignore-scripts --no-audit --no-fund --allow-git=none
      - run: npm run build
      - name: Snapshot tags before publish
        run: git tag | sort > "$RUNNER_TEMP/tags-before.txt"
      - name: Publish (all bumped packages, idempotent)
        run: npx changeset publish
        env:
          # Provenance only when the source repo is public (npm can't attest a private repo);
          # auto-flips on going OSS, off while internal so publish doesn't fail.
          NPM_CONFIG_PROVENANCE: ${{ github.event.repository.visibility == 'public' }}
      - name: Push tags created by changeset publish
        run: git push --follow-tags
      - name: Determine newly created tags
        id: tags
        run: |
          git tag | sort > "$RUNNER_TEMP/tags-after.txt"
          comm -13 "$RUNNER_TEMP/tags-before.txt" "$RUNNER_TEMP/tags-after.txt" > "$RUNNER_TEMP/new-tags.txt"
          echo "New tags:"; cat "$RUNNER_TEMP/new-tags.txt"
      - name: Create per-package GitHub Releases
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          NEW_TAGS_FILE: ${{ runner.temp }}/new-tags.txt
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const tags = fs
              .readFileSync(process.env.NEW_TAGS_FILE, 'utf8')
              .split('\n')
              .map((s) => s.trim())
              .filter(Boolean);
            for (const tag of tags) {
              try {
                await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: tag,
                  name: tag,
                  generate_release_notes: true,
                });
                core.info(`Created release ${tag}`);
              } catch (e) {
                if (e.status === 422) {
                  core.info(`Release ${tag} already exists — skipping`);
                } else {
                  throw e;
                }
              }
            }

  # Rollup sentinel: stable status for the release pipeline.
  release-status:
    name: Release Status
    needs: [check-release, publish-npm]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    defaults:
      run:
        shell: bash -eo pipefail {0}
    steps:
      - name: Check results
        run: |
          echo "::group::Job results"
          echo "should_publish: $SHOULD_PUBLISH"
          echo "publish result: $PUBLISH_RESULT"
          echo "::endgroup::"

          if [[ "$SHOULD_PUBLISH" != "true" ]]; then
            echo "::notice::Not a release — publish skipped"
            exit 0
          fi
          if [[ "$PUBLISH_RESULT" != "success" ]]; then
            echo "::error::Publish failed or was cancelled"
            exit 1
          fi
          echo "::notice::Release published"
        env:
          SHOULD_PUBLISH: ${{ needs.check-release.outputs.should_publish }}
          PUBLISH_RESULT: ${{ needs.publish-npm.result }}
