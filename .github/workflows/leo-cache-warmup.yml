name: Leo CLI Cache Warmup

on:
  schedule:
    # Run every Saturday at 11 PM UTC (before the work week)
    - cron: "0 23 * * 6"
  workflow_dispatch:
    inputs:
      force-rebuild:
        description: "Force rebuild even if cache exists"
        type: boolean
        default: false

# No default permissions - jobs must explicitly request what they need
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  warmup-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write # Required for cache operations
    timeout-minutes: 50
    defaults:
      run:
        shell: bash -eo pipefail {0}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # setup-leo-action v1.1.3 builds from source; the pinned SHA resolves the
      # leo-lang-v4.3.2 tag (Leo 4.3.2 shares the 4.2.0 MSRV, Rust 1.96.0).
      - name: Setup Leo CLI (Cache Warmup)
        id: setup-leo
        uses: sealance-io/setup-leo-action@3fb8fc821388716961eee9146b414fcfc093b32d # v1.1.3
        with:
          version: "4.3.2" # semver-only; matches core examples' leoVersion
          rust-version: "1.96.0" # Leo v4.3.2 MSRV (== 4.2.0)
          enable-cache: true
          cache-save: always # Always save to ensure cache is refreshed
          run-audit: true
          audit-deny-warnings: false

      - name: Report cache status
        run: |
          {
            echo "## Leo CLI Cache Warmup Summary"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Leo Version | 4.3.2 |"
            echo "| Rust Version | 1.96.0 |"
            echo "| Cache Hit (Binary) | $CACHE_HIT_BINARY |"
            echo "| Build Time | ${BUILD_TIME_SECONDS}s |"
            echo ""
            if [ "$CACHE_HIT_BINARY" = "true" ]; then
              echo "Cache was already warm - refreshed for another 7 days"
            else
              echo "Cache miss - Leo was compiled from source and cached"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          CACHE_HIT_BINARY: ${{ steps.setup-leo.outputs.cache-hit-binary }}
          BUILD_TIME_SECONDS: ${{ steps.setup-leo.outputs.build-time-seconds }}

      - name: Verify Leo installation
        run: leo --version
